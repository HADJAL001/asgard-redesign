name: keep-alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

env:
  BASE_URL: https://osgardnewworld.com
  SLOW_THRESHOLD_S: "2"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Switch to monitoring-data branch
        run: |
          git fetch origin monitoring-data 2>/dev/null && git checkout monitoring-data || {
            git checkout --orphan monitoring-data
            git rm -rf . >/dev/null 2>&1 || true
          }
          mkdir -p monitoring
          if [ ! -f monitoring/status-log.csv ]; then
            echo "timestamp,endpoint,http_code,response_time_s,ok" > monitoring/status-log.csv
          fi

      - name: Check /api/health
        id: health
        continue-on-error: true
        run: |
          set +e
          OUT=$(curl -s -o /tmp/health_body.json -w "%{http_code} %{time_total}" --max-time 15 "$BASE_URL/api/health")
          CODE=$(echo "$OUT" | awk '{print $1}')
          TIME=$(echo "$OUT" | awk '{print $2}')
          echo "code=${CODE:-000}" >> "$GITHUB_OUTPUT"
          echo "time=${TIME:-0}" >> "$GITHUB_OUTPUT"
          if echo "$CODE" | grep -qE '^[23][0-9]{2}$'; then
            echo "ok=1" >> "$GITHUB_OUTPUT"
          else
            echo "ok=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Check /api/tc-market/state
        id: market
        continue-on-error: true
        run: |
          set +e
          OUT=$(curl -s -o /tmp/market_body.json -w "%{http_code} %{time_total}" --max-time 15 "$BASE_URL/api/tc-market/state")
          CODE=$(echo "$OUT" | awk '{print $1}')
          TIME=$(echo "$OUT" | awk '{print $2}')
          echo "code=${CODE:-000}" >> "$GITHUB_OUTPUT"
          echo "time=${TIME:-0}" >> "$GITHUB_OUTPUT"
          if echo "$CODE" | grep -qE '^[23][0-9]{2}$'; then
            echo "ok=1" >> "$GITHUB_OUTPUT"
          else
            echo "ok=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Append metrics and push to monitoring-data
        run: |
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "$TS,health,${{ steps.health.outputs.code }},${{ steps.health.outputs.time }},${{ steps.health.outputs.ok }}" >> monitoring/status-log.csv
          echo "$TS,tc-market-state,${{ steps.market.outputs.code }},${{ steps.market.outputs.time }},${{ steps.market.outputs.ok }}" >> monitoring/status-log.csv
          git add monitoring/status-log.csv
          git -c user.name="keep-alive-bot" -c user.email="actions@github.com" commit -m "chore(monitoring): log ping $TS [skip ci]" || echo "nothing to commit"
          for i in 1 2 3; do
            git push origin HEAD:monitoring-data && break
            git fetch origin monitoring-data
            git rebase origin/monitoring-data
            sleep 2
          done

      - name: Check response time
        id: timing
        run: |
          SLOW=""
          for pair in "health:${{ steps.health.outputs.time }}" "tc-market/state:${{ steps.market.outputs.time }}"; do
            name="${pair%%:*}"
            t="${pair##*:}"
            is_slow=$(awk -v t="$t" -v th="$SLOW_THRESHOLD_S" 'BEGIN { print (t+0 > th+0) ? 1 : 0 }')
            if [ "$is_slow" = "1" ]; then
              echo "::warning::Медленный ответ $name: ${t}s (порог ${SLOW_THRESHOLD_S}s)"
              SLOW="$SLOW $name(${t}s)"
            fi
          done
          echo "slow=$SLOW" >> "$GITHUB_OUTPUT"

      - name: Alert in Telegram on slow response
        if: steps.timing.outputs.slow != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            exit 0
          fi
          TEXT="⚠️ OSGARD backend отвечает медленно:${{ steps.timing.outputs.slow }}
          Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -fsS --max-time 15 \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="${TEXT}"

      - name: Evaluate health & market checks
        run: |
          FAIL=0
          if [ "${{ steps.health.outputs.ok }}" != "1" ]; then
            echo "::error::/api/health failed (code=${{ steps.health.outputs.code }})"
            FAIL=1
          fi
          if [ "${{ steps.market.outputs.ok }}" != "1" ]; then
            echo "::error::/api/tc-market/state failed (code=${{ steps.market.outputs.code }})"
            FAIL=1
          fi
          if [ "$FAIL" = "1" ]; then
            exit 1
          fi

      - name: Alert in Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::warning::TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID secrets are not set — skipping alert"
            exit 0
          fi
          TEXT="🔴 OSGARD backend недоступен.
          /api/health: код ${{ steps.health.outputs.code }}
          /api/tc-market/state: код ${{ steps.market.outputs.code }}
          Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -fsS --max-time 15 \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="${TEXT}"
